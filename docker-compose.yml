services:
  backend:
    build: ./backend
    container_name: smartdive-backend
    # 必须与 .env 中 PORT 一致（默认 8080）；映射错会导致浏览器访问 localhost:8080 连接被拒绝
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./.env:/app/.env:ro

  frontend:
    build: ./frontend
    container_name: smartdive-frontend
    ports:
      # 宿主机 3000：避免 Windows 保留端口段内绑定 5173；容器内 Vite 监听 5173
      - "3000:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules